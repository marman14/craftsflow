<!--
title: Book a Strategy Call | Craftsflow
description: Claim your exclusive ZIP code and book a free 20-min strategy session with our agency growth team.
breadcrumbs: Home > Contact
-->
<section class="inner-page-hero">
  <div class="container">
    <h1>Book Your Free Strategy Call</h1>
    <p class="inner-page-intro">We'll review your local ZIP code, analyze your competitors, and give you an exact growth strategy plan. No obligation. 100% free.</p>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="contact-layout reveal">
      <div class="contact-card">
        <form class="contact-form" action="#" method="POST" onsubmit="event.preventDefault(); alert('Strategy call requested! We will contact you within 4 hours.');">
          <div class="form-row-2col">
            <div class="form-group">
              <label for="name">Your Name</label>
              <input type="text" id="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input type="email" id="email" required placeholder="john@example.com">
            </div>
          </div>
          
          <div class="form-row-2col">
            <div class="form-group">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" required placeholder="(555) 000-0000">
            </div>
            <div class="form-group">
              <label for="business-type">Business Type</label>
              <select id="business-type" required>
                <option value="" disabled selected>Select business type</option>
                <option value="realtor">Realtor / Agent</option>
                <option value="builder">Real Estate Developer / Builder</option>
                <option value="brokerage">Real Estate Brokerage</option>
                <option value="local-business">Local Business / Contractor</option>
                <option value="ecommerce">E-Commerce</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>
          
          <div class="form-group">
            <label for="msg">How Can We Help You?</label>
            <textarea id="msg" rows="4" placeholder="Tell us about your marketing challenges..."></textarea>
          </div>
          
          <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Request Strategy Call →</button>
        </form>
      </div>

      <div class="contact-info-list">
        <div class="contact-info-item">
          <div class="contact-info-icon">✉</div>
          <div>
            <div class="contact-info-title">Email Us</div>
            <a href="mailto:hello@craftsflow.com" class="contact-info-text">hello@craftsflow.com</a>
          </div>
        </div>
        <div class="contact-info-item">
          <div class="contact-info-icon">☎</div>
          <div>
            <div class="contact-info-title">Call Us</div>
            <a href="tel:+14702063834" class="contact-info-text">(470) 206-3834</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
